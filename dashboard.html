<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Dashboard · Cookie Dojo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1C1209; --ink-soft: #3D2B18; --brown-mid: #6B3E1F;
  --amber: #C8721A; --gold: #D4A843;
  --cream: #FBF4E6; --cream-warm: #F5E8C8; --parchment: #EDD9A3;
  --white: #FFFDF7; --green: #2D7A4F; --red: #B83232;
  --font-display: 'Shippori Mincho', serif;
  --font-body: 'DM Sans', sans-serif;
}
body { font-family: var(--font-body); background: #F0EAD8; color: var(--ink); min-height: 100vh; }

/* TOPBAR */
.topbar {
  background: var(--ink); padding: 0 32px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar-brand {
  font-family: var(--font-display); font-size: 18px; font-weight: 700;
  color: var(--cream);
}
.topbar-brand span { color: var(--gold); }
.topbar-tag {
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(251,244,230,0.35); margin-left: 10px;
}

.topbar-right { display: flex; align-items: center; gap: 16px; }
.btn-refresh {
  background: rgba(251,244,230,0.08); color: rgba(251,244,230,0.6);
  border: 1px solid rgba(251,244,230,0.12); border-radius: 4px;
  padding: 6px 14px; font-family: var(--font-body);
  font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; transition: background 0.2s;
}
.btn-refresh:hover { background: rgba(251,244,230,0.14); color: var(--gold); }
.live-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #2D7A4F;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* LAYOUT */
.dash-wrap { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }

/* STAT CARDS */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 16px; margin-bottom: 32px;
}
.stat-card {
  background: var(--white); border-radius: 8px;
  border: 1px solid rgba(200,114,26,0.1);
  padding: 20px 24px;
}
.stat-label {
  font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-soft);
  margin-bottom: 8px;
}
.stat-value {
  font-family: var(--font-display); font-size: 32px; font-weight: 700;
  color: var(--ink); line-height: 1;
}
.stat-value.green { color: var(--green); }
.stat-sub { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }

/* FILTERS */
.filters-row {
  display: flex; gap: 10px; align-items: center;
  margin-bottom: 20px; flex-wrap: wrap;
}
.filter-btn {
  padding: 7px 16px; border-radius: 4px;
  border: 1.5px solid var(--parchment);
  background: var(--white);
  font-family: var(--font-body); font-size: 12px;
  font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink-soft); cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--amber); color: var(--amber); }
.filter-btn.active { background: var(--amber); border-color: var(--amber); color: white; }
.search-wrap { margin-left: auto; }
.search-input {
  padding: 8px 14px; border-radius: 4px;
  border: 1.5px solid var(--parchment);
  background: var(--white);
  font-family: var(--font-body); font-size: 13px;
  color: var(--ink); width: 220px;
  transition: border-color 0.2s;
}
.search-input:focus { outline: none; border-color: var(--amber); }
.search-input::placeholder { color: rgba(61,43,24,0.35); }

/* TABLE */
.table-wrap {
  background: var(--white); border-radius: 8px;
  border: 1px solid rgba(200,114,26,0.1);
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead { background: var(--cream); }
th {
  padding: 12px 18px; text-align: left;
  font-size: 10px; font-weight: 500; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--ink-soft);
  border-bottom: 1px solid var(--parchment);
}
td {
  padding: 14px 18px; font-size: 14px; color: var(--ink);
  border-bottom: 1px solid rgba(200,114,26,0.06);
  vertical-align: top;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(251,244,230,0.5); }

.order-id {
  font-family: var(--font-display); font-size: 13px;
  font-weight: 600; color: var(--amber);
}
.order-name { font-weight: 500; }
.order-contact { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.order-items { font-size: 13px; line-height: 1.5; }
.order-item-chip {
  display: inline-block; background: var(--cream);
  border: 1px solid var(--parchment); border-radius: 3px;
  padding: 2px 8px; font-size: 11px; margin: 2px 2px 2px 0;
  color: var(--ink-soft);
}
.order-total { font-family: var(--font-display); font-size: 16px; font-weight: 700; }
.order-address { font-size: 12px; color: var(--ink-soft); max-width: 160px; line-height: 1.4; }
.order-notes { font-size: 12px; color: var(--ink-soft); max-width: 160px; line-height: 1.4; font-style: italic; }
.order-date { font-size: 12px; color: var(--ink-soft); white-space: nowrap; }

/* STATUS BADGE */
.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 3px;
  font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
  text-transform: uppercase; cursor: pointer;
  border: none; font-family: var(--font-body);
  transition: opacity 0.15s;
}
.status-badge:hover { opacity: 0.8; }
.status-new { background: rgba(200,114,26,0.12); color: var(--amber); }
.status-confirmed { background: rgba(45,122,79,0.1); color: var(--green); }
.status-ready { background: rgba(45,122,79,0.2); color: #1A5C35; }
.status-delivered { background: rgba(61,43,24,0.08); color: var(--ink-soft); }

/* ACTION BUTTONS */
.action-btns { display: flex; gap: 6px; }
.btn-action {
  padding: 5px 10px; border-radius: 3px;
  border: 1px solid var(--parchment); background: transparent;
  font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink-soft);
  cursor: pointer; font-family: var(--font-body);
  transition: all 0.15s;
}
.btn-action:hover { border-color: var(--amber); color: var(--amber); }
.btn-action.danger:hover { border-color: var(--red); color: var(--red); }

/* Empty state */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--ink-soft);
}
.empty-state-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state-title {
  font-family: var(--font-display); font-size: 20px;
  color: var(--ink); margin-bottom: 8px;
}

/* DETAIL DRAWER (slide-in) */
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(28,18,9,0.4);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.drawer-overlay.open { opacity: 1; pointer-events: all; }
.drawer {
  position: fixed; top: 0; right: -480px; bottom: 0;
  width: 460px; background: var(--white);
  z-index: 201; overflow-y: auto;
  transition: right 0.3s ease;
  box-shadow: -4px 0 32px rgba(28,18,9,0.12);
}
.drawer.open { right: 0; }
.drawer-header {
  background: var(--ink); padding: 24px 28px;
  display: flex; align-items: center; justify-content: space-between;
}
.drawer-title {
  font-family: var(--font-display); font-size: 18px;
  font-weight: 700; color: var(--cream);
}
.drawer-close {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(251,244,230,0.1); border: none;
  color: var(--cream); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.drawer-close:hover { background: rgba(251,244,230,0.2); }
.drawer-body { padding: 28px; }
.drawer-section { margin-bottom: 24px; }
.drawer-section-title {
  font-size: 10px; font-weight: 500; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--amber);
  margin-bottom: 12px; padding-bottom: 6px;
  border-bottom: 1px solid var(--parchment);
}
.drawer-row {
  display: flex; justify-content: space-between;
  padding: 7px 0; font-size: 14px;
  border-bottom: 1px solid rgba(200,114,26,0.06);
}
.drawer-row:last-child { border-bottom: none; }
.drawer-row-label { color: var(--ink-soft); }
.drawer-row-value { font-weight: 500; text-align: right; max-width: 240px; }

.status-select {
  width: 100%; padding: 10px 12px;
  background: var(--cream); border: 1.5px solid var(--parchment);
  border-radius: 4px; font-family: var(--font-body);
  font-size: 14px; color: var(--ink); cursor: pointer;
  transition: border-color 0.2s; margin-top: 8px;
}
.status-select:focus { outline: none; border-color: var(--amber); }

.btn-send-receipt {
  width: 100%; background: var(--amber); color: white;
  border: none; border-radius: 4px; padding: 13px;
  font-family: var(--font-body); font-size: 13px;
  font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; transition: background 0.2s; margin-top: 8px;
}
.btn-send-receipt:hover { background: var(--ink); }

@media (max-width: 800px) {
  .stats-row { grid-template-columns: 1fr 1fr; }
  .drawer { width: 100%; right: -100%; }
  th:nth-child(4), td:nth-child(4),
  th:nth-child(5), td:nth-child(5) { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;">
    <span class="topbar-brand">Cookie <span>Dojo</span></span>
    <span class="topbar-tag">Order Dashboard</span>
  </div>
  <div class="topbar-right">
    <div class="live-dot"></div>
    <button class="btn-refresh" onclick="loadOrders()">↻ Refresh</button>
  </div>
</div>

<div class="dash-wrap">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Orders</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-sub">All time</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">New Orders</div>
      <div class="stat-value" id="statNew" style="color:var(--amber);">—</div>
      <div class="stat-sub">Need attention</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Revenue</div>
      <div class="stat-value green" id="statRevenue">—</div>
      <div class="stat-sub">Confirmed orders</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending Quote</div>
      <div class="stat-value" id="statSushi" style="color:var(--brown-mid);">—</div>
      <div class="stat-sub">Candy sushi orders</div>
    </div>
  </div>

  <!-- FILTERS + SEARCH -->
  <div class="filters-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('new', this)">New</button>
    <button class="filter-btn" onclick="setFilter('confirmed', this)">Confirmed</button>
    <button class="filter-btn" onclick="setFilter('ready', this)">Ready</button>
    <button class="filter-btn" onclick="setFilter('delivered', this)">Delivered</button>
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="Search name or order ID..." oninput="renderTable()" />
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Order</th>
          <th>Customer</th>
          <th>Items</th>
          <th>Total</th>
          <th>Delivery / Notes</th>
          <th>Status</th>
          <th>Date</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="ordersTable">
        <tr><td colspan="8"><div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">Loading orders...</div></div></td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- DETAIL DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title" id="drawerTitle">Order Details</div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script>
// ============================================================
// ⚠️  DASHBOARD CONFIGURATION
// Replace with your backend API URL
// ============================================================
const API_BASE = 'https://YOUR-BACKEND-URL';
// ============================================================

let allOrders = [];
let currentFilter = 'all';

// ============================================================
// DEMO DATA — Remove once backend is connected
// ============================================================
function getDemoOrders() {
  return [
    {
      id: 'CD-A7X2K1', customer_name: 'Sarah Mitchell', customer_email: 'sarah@example.com',
      customer_phone: '(904) 555-0142', items: [{name:'Coconut Macaroons',qty:2,price:18},{name:'Super Box',qty:1,price:44.99}],
      total: 80.99, address: '142 Riverside Ave, Jacksonville FL 32202',
      notes: 'For a bridal shower — can you do pink ribbon?', status: 'new',
      date: new Date(Date.now() - 3600000).toISOString(), has_sushi: false
    },
    {
      id: 'CD-B3Q8W2', customer_name: 'Marcus Thompson', customer_email: 'marcus@example.com',
      customer_phone: '(904) 555-0261', items: [{name:'Rice Crispy Pops',qty:12,price:3.99},{name:'Candy Sushi Tray',qty:1,price:0}],
      total: 47.88, address: 'Pickup', notes: 'Green and gold for graduation party', status: 'confirmed',
      date: new Date(Date.now() - 86400000).toISOString(), has_sushi: true
    },
    {
      id: 'CD-C9M4R3', customer_name: 'Jordan Lee', customer_email: 'jordan@example.com',
      customer_phone: '(904) 555-0388', items: [{name:'Variety Box',qty:3,price:24}],
      total: 72.00, address: '88 Beach Blvd, Jax Beach FL 32250', notes: '', status: 'ready',
      date: new Date(Date.now() - 172800000).toISOString(), has_sushi: false
    },
    {
      id: 'CD-D1P6T4', customer_name: 'Camille Washington', customer_email: 'cam@example.com',
      customer_phone: '(904) 555-0499', items: [{name:'Coconut Macaroons',qty:1,price:18},{name:'Rice Crispy Pops',qty:6,price:3.99}],
      total: 41.94, address: '507 Magnolia St, Jacksonville FL 32204', notes: 'Nut allergy — please confirm', status: 'delivered',
      date: new Date(Date.now() - 432000000).toISOString(), has_sushi: false
    }
  ];
}

async function loadOrders() {
  try {
    const res = await fetch(API_BASE + '/orders');
    if (!res.ok) throw new Error();
    allOrders = await res.json();
  } catch {
    // Use demo data if backend not connected
    allOrders = getDemoOrders();
  }
  updateStats();
  renderTable();
}

function updateStats() {
  document.getElementById('statTotal').textContent = allOrders.length;
  document.getElementById('statNew').textContent = allOrders.filter(o => o.status === 'new').length;
  const revenue = allOrders.filter(o => ['confirmed','ready','delivered'].includes(o.status)).reduce((s,o) => s + o.total, 0);
  document.getElementById('statRevenue').textContent = '$' + revenue.toFixed(2);
  document.getElementById('statSushi').textContent = allOrders.filter(o => o.has_sushi).length;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let orders = allOrders;
  if (currentFilter !== 'all') orders = orders.filter(o => o.status === currentFilter);
  if (search) orders = orders.filter(o =>
    o.customer_name.toLowerCase().includes(search) ||
    o.id.toLowerCase().includes(search) ||
    o.customer_email.toLowerCase().includes(search)
  );

  const tbody = document.getElementById('ordersTable');
  if (orders.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
      <div class="empty-state-icon">🍪</div>
      <div class="empty-state-title">No orders found</div>
    </div></td></tr>`;
    return;
  }

  tbody.innerHTML = orders.map(o => {
    const itemChips = o.items.map(i => `<span class="order-item-chip">${i.name} ×${i.qty}</span>`).join('');
    const statusClass = { new:'status-new', confirmed:'status-confirmed', ready:'status-ready', delivered:'status-delivered' }[o.status] || 'status-new';
    const statusLabel = { new:'🔴 New', confirmed:'✅ Confirmed', ready:'📦 Ready', delivered:'✓ Delivered' }[o.status] || o.status;
    const dateStr = new Date(o.date).toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });

    return `<tr>
      <td><div class="order-id">${o.id}</div></td>
      <td>
        <div class="order-name">${o.customer_name}</div>
        <div class="order-contact">${o.customer_email}</div>
        <div class="order-contact">${o.customer_phone}</div>
      </td>
      <td><div class="order-items">${itemChips}</div></td>
      <td><div class="order-total">$${o.total.toFixed(2)}${o.has_sushi ? '+' : ''}</div></td>
      <td>
        <div class="order-address">${o.address || '—'}</div>
        ${o.notes ? `<div class="order-notes" style="margin-top:4px;">"${o.notes}"</div>` : ''}
      </td>
      <td>
        <button class="status-badge ${statusClass}" onclick="cycleStatus('${o.id}')">${statusLabel}</button>
      </td>
      <td><div class="order-date">${dateStr}</div></td>
      <td>
        <div class="action-btns">
          <button class="btn-action" onclick="openDrawer('${o.id}')">View</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function cycleStatus(id) {
  const order = allOrders.find(o => o.id === id);
  if (!order) return;
  const cycle = ['new', 'confirmed', 'ready', 'delivered'];
  const idx = cycle.indexOf(order.status);
  order.status = cycle[(idx + 1) % cycle.length];
  updateStats();
  renderTable();
  // In production: await fetch(API_BASE + '/orders/' + id + '/status', { method: 'PATCH', body: JSON.stringify({status: order.status}) })
}

function openDrawer(id) {
  const o = allOrders.find(o => o.id === id);
  if (!o) return;

  document.getElementById('drawerTitle').textContent = 'Order ' + o.id;
  const itemRows = o.items.map(i => `
    <div class="drawer-row">
      <span class="drawer-row-label">${i.name} ×${i.qty}</span>
      <span class="drawer-row-value">${i.price > 0 ? '$'+(i.price*i.qty).toFixed(2) : 'TBD'}</span>
    </div>`).join('');

  document.getElementById('drawerBody').innerHTML = `
    <div class="drawer-section">
      <div class="drawer-section-title">Customer</div>
      <div class="drawer-row"><span class="drawer-row-label">Name</span><span class="drawer-row-value">${o.customer_name}</span></div>
      <div class="drawer-row"><span class="drawer-row-label">Email</span><span class="drawer-row-value">${o.customer_email}</span></div>
      <div class="drawer-row"><span class="drawer-row-label">Phone</span><span class="drawer-row-value">${o.customer_phone}</span></div>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Items Ordered</div>
      ${itemRows}
      <div class="drawer-row" style="margin-top:8px; font-weight:600;">
        <span class="drawer-row-label">Total</span>
        <span class="drawer-row-value" style="color:var(--amber);">$${o.total.toFixed(2)}${o.has_sushi?'+':''}</span>
      </div>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Delivery</div>
      <div class="drawer-row"><span class="drawer-row-label">Address</span><span class="drawer-row-value">${o.address||'—'}</span></div>
      ${o.notes ? `<div class="drawer-row"><span class="drawer-row-label">Notes</span><span class="drawer-row-value" style="font-style:italic;">"${o.notes}"</span></div>` : ''}
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Update Status</div>
      <select class="status-select" id="drawerStatus" onchange="updateStatusFromDrawer('${o.id}', this.value)">
        <option value="new" ${o.status==='new'?'selected':''}>🔴 New</option>
        <option value="confirmed" ${o.status==='confirmed'?'selected':''}>✅ Confirmed</option>
        <option value="ready" ${o.status==='ready'?'selected':''}>📦 Ready for Pickup/Delivery</option>
        <option value="delivered" ${o.status==='delivered'?'selected':''}>✓ Delivered</option>
      </select>
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Actions</div>
      <button class="btn-send-receipt" onclick="sendReceipt('${o.id}')">✉ Resend Receipt to Customer</button>
    </div>
  `;

  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}

function updateStatusFromDrawer(id, status) {
  const order = allOrders.find(o => o.id === id);
  if (order) { order.status = status; updateStats(); renderTable(); }
}

function sendReceipt(id) {
  alert('Receipt resent! (Connect to backend to make this live)');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

// Init
loadOrders();
// Auto-refresh every 60 seconds
setInterval(loadOrders, 60000);
</script>
</body>
</html>
